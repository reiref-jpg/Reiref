<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Colosseum Tannlege – Romplansystem</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx-js-style.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:      #0078be;
      --brand-dk:   #005f98;
      --brand-dp:   #004a78;
      --brand-lt:   #e6f3fb;
      --brand-pale: #f0f8ff;
      --accent:     #00a8e0;
      --asst:       #7c3aed;
      --asst-dk:    #5b21b6;
      --asst-lt:    #ede9fe;
      --asst-bd:    #c4b5fd;
      --asst-pale:  #f5f3ff;
      --gold:       #f0a500;
      --gold-dk:    #d4920a;
      --green:      #16a34a;
      --red:        #ef4444;
      --text-hd:    #0a2540;
      --text-bd:    #334155;
      --text-mu:    #7a8fa8;
      --border:     #dde6ef;
      --bg:         #f2f6fa;
      --white:      #ffffff;
      --sh-sm:  0 1px 4px rgba(0,80,150,.08);
      --sh-md:  0 4px 20px rgba(0,80,150,.10);
      --sh-lg:  0 16px 48px rgba(0,80,150,.16);
    }

    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text-bd); min-height: 100vh; }

    /* ── HEADER ── */
    header { background: var(--white); border-bottom: 3px solid var(--brand); box-shadow: 0 2px 16px rgba(0,80,150,.10); display: flex; align-items: center; padding: 0 36px; }
    .hdr-logo { padding: 16px 28px 16px 0; border-right: 1px solid var(--border); margin-right: 24px; display: flex; align-items: center; }
    .hdr-logo img { height: 42px; display: block; }
    .hdr-title h1 { font-size: 1.05rem; font-weight: 700; color: var(--text-hd); letter-spacing: -.2px; }
    .hdr-title p  { font-size: .76rem; color: var(--text-mu); margin-top: 2px; }
    .hdr-spacer { flex: 1; }
    .hdr-stats { display: flex; align-items: center; gap: 10px; padding: 16px 0; }
    .hdr-stat { display: flex; flex-direction: column; align-items: center; background: var(--brand-pale); border: 1.5px solid #c5dcee; border-radius: 10px; padding: 8px 20px; }
    .hdr-stat .sn { font-size: 1.3rem; font-weight: 800; color: var(--brand); line-height: 1; }
    .hdr-stat .sl { font-size: .66rem; color: var(--text-mu); margin-top: 3px; text-transform: uppercase; letter-spacing: .6px; font-weight: 600; }
    .accent-bar { height: 4px; background: linear-gradient(90deg, var(--brand) 0%, var(--accent) 60%, #80d4f5 100%); }

    /* ── DASHBOARD ── */
    .dashboard { padding: 20px 36px 4px; display: flex; flex-wrap: wrap; gap: 12px; }
    .dash-card { background: var(--white); border-radius: 14px; box-shadow: var(--sh-sm); border: 1px solid var(--border); padding: 16px 20px; flex: 1; min-width: 200px; position: relative; overflow: hidden; }
    .dash-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }
    .dash-card.day-card::before   { background: var(--brand); }
    .dash-card.week-card::before  { background: var(--accent); }
    .dash-card.month-card::before { background: var(--gold); }
    .dash-title { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-mu); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .dash-title .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dash-metrics { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
    .dash-metric .val { font-size: 1.55rem; font-weight: 800; line-height: 1; }
    .dash-metric .lbl { font-size: .68rem; color: var(--text-mu); font-weight: 500; margin-top: 2px; }
    .dash-metric.m-dentist .val { color: var(--brand); }
    .dash-metric.m-asst    .val { color: var(--asst); }
    .dash-metric.m-pct     .val { color: var(--gold-dk); }
    .dash-div { width: 1px; background: var(--border); align-self: stretch; min-height: 36px; }
    .dash-bar-wrap { margin-top: 10px; height: 5px; background: #e8edf2; border-radius: 99px; overflow: hidden; }
    .dash-bar { height: 100%; border-radius: 99px; transition: width .5s ease; }
    .day-card  .dash-bar { background: linear-gradient(90deg, var(--brand), var(--accent)); }
    .week-card .dash-bar { background: linear-gradient(90deg, var(--accent), #80d4f5); }
    .month-card .dash-bar { background: linear-gradient(90deg, var(--gold), #fbbf24); }
    .dash-note { font-size: .62rem; color: var(--text-mu); margin-top: 6px; font-style: italic; }
    .dash-days { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
    .day-pill { font-size: .68rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: var(--brand-lt); color: var(--brand-dk); border: 1px solid #b8ddf3; }
    .day-pill.today { background: var(--gold); color: white; border-color: var(--gold-dk); }
    .day-pill.empty { background: #f1f5f9; color: var(--text-mu); border-color: var(--border); }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 36px; background: var(--white); border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; box-shadow: var(--sh-sm); }
    .tleft, .tright { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .week-nav { display: flex; align-items: center; gap: 6px; background: var(--brand-pale); border: 1.5px solid #c5dcee; border-radius: 10px; padding: 7px 14px; font-size: .88rem; font-weight: 600; color: var(--brand-dk); }
    .week-nav button { background: none; border: none; cursor: pointer; color: var(--brand); font-size: 1.15rem; padding: 0 3px; font-weight: 700; line-height: 1; transition: color .15s; }
    .week-nav button:hover { color: var(--brand-dp); }
    .btn { padding: 8px 18px; border-radius: 9px; border: none; cursor: pointer; font-size: .83rem; font-weight: 600; font-family: inherit; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none !important; }
    .btn-primary { background: linear-gradient(135deg, var(--brand), var(--brand-dk)); color: white; box-shadow: 0 3px 10px rgba(0,120,190,.3); }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 5px 16px rgba(0,120,190,.4); transform: translateY(-1px); }
    .btn-ghost { background: white; color: var(--text-bd); border: 1.5px solid var(--border); }
    .btn-ghost:hover { background: var(--brand-pale); border-color: #c5dcee; color: var(--brand-dk); }
    .btn-excel { background: linear-gradient(135deg, #1d6f42, #155534); color: white; box-shadow: 0 3px 10px rgba(29,111,66,.3); }
    .btn-excel:hover:not(:disabled) { box-shadow: 0 5px 16px rgba(29,111,66,.4); transform: translateY(-1px); }
    .legend { display: flex; align-items: center; gap: 10px; font-size: .75rem; color: var(--text-mu); flex-wrap: wrap; }
    .leg-tag { font-size: .7rem; font-weight: 600; padding: 2px 9px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; }
    .leg-tag.dentist   { background: var(--brand-lt); color: var(--brand-dk); border: 1px solid #b8ddf3; }
    .leg-tag.assistant { background: var(--asst-lt);  color: var(--asst-dk);  border: 1px solid var(--asst-bd); }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

    /* ── GRID ── */
    .grid-wrap { overflow-x: auto; padding: 20px 36px 48px; }
    table { width: 100%; min-width: 860px; border-collapse: separate; border-spacing: 0; background: var(--white); border-radius: 16px; overflow: hidden; box-shadow: var(--sh-md); }
    thead th { padding: 14px 12px; text-align: center; font-size: .76rem; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; background: var(--brand); color: rgba(255,255,255,.85); }
    thead th:first-child { text-align: left; padding-left: 22px; width: 148px; background: var(--brand-dp); color: rgba(255,255,255,.9); border-right: 2px solid rgba(255,255,255,.15); }
    thead th .day-name { font-size: .82rem; color: white; letter-spacing: .2px; }
    thead th .date-sub { display: block; font-size: .68rem; font-weight: 400; opacity: .72; margin-top: 3px; text-transform: none; letter-spacing: 0; }
    thead th.today-col { background: linear-gradient(180deg, var(--gold), var(--gold-dk)) !important; }
    tbody tr { transition: background .1s; }
    tbody tr:hover td { background: #f5faff !important; }
    tbody tr:last-child td { border-bottom: none; }
    tbody td { border-bottom: 1px solid #eef3f8; vertical-align: top; padding: 10px; }
    tbody tr:nth-child(even) td { background: #fafcfe; }
    tbody td:first-child { border-right: 2px solid #dde6ef; padding: 12px 14px 12px 22px; background: white !important; }
    tbody tr:nth-child(even) td:first-child { background: #fafcfe !important; }
    .room-badge { display: flex; align-items: center; gap: 8px; }
    .room-num { width: 30px; height: 30px; border-radius: 8px; background: linear-gradient(135deg, var(--brand), var(--brand-dk)); color: white; font-size: .75rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,120,190,.28); }
    .room-lbl { font-size: .82rem; font-weight: 600; color: var(--text-hd); }
    .room-sub { font-size: .68rem; color: var(--text-mu); margin-top: 1px; }
    td.today-col { background: #fffbf0 !important; border-left: 2px solid var(--gold); border-right: 2px solid var(--gold); }

    /* ── CELL ── */
    .cell { min-height: 86px; display: flex; flex-direction: column; }
    .cell-section { display: flex; flex-direction: column; gap: 4px; padding: 5px 0; }
    .cell-section + .cell-section { border-top: 1px dashed #e2e8f0; padding-top: 6px; margin-top: 2px; }
    .section-label { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
    .section-label.lbl-dentist { color: var(--brand); }
    .section-label.lbl-asst    { color: var(--asst); }
    .section-label svg { width: 10px; height: 10px; flex-shrink: 0; }
    .name-tag { display: flex; align-items: center; gap: 7px; border-radius: 8px; padding: 5px 9px; font-size: .79rem; font-weight: 600; animation: tagIn .2s ease; transition: box-shadow .15s; }
    .name-tag.tag-dentist { background: linear-gradient(135deg,#e8f5fd,#d5ecf9); border: 1px solid #b8ddf3; color: var(--brand-dk); box-shadow: 0 1px 4px rgba(0,120,190,.10); }
    .name-tag.tag-dentist:hover { box-shadow: 0 2px 8px rgba(0,120,190,.18); }
    .name-tag.tag-asst { background: linear-gradient(135deg,#ede9fe,#ddd6fe); border: 1px solid var(--asst-bd); color: var(--asst-dk); box-shadow: 0 1px 4px rgba(124,58,237,.10); }
    .name-tag.tag-asst:hover { box-shadow: 0 2px 8px rgba(124,58,237,.18); }
    .avatar { width: 22px; height: 22px; border-radius: 50%; color: white; font-size: .6rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .avatar.av-dentist { background: linear-gradient(135deg, var(--brand), var(--accent)); box-shadow: 0 1px 4px rgba(0,120,190,.3); }
    .avatar.av-asst    { background: linear-gradient(135deg, var(--asst), #a855f7); box-shadow: 0 1px 4px rgba(124,58,237,.3); }
    .tag-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .del-btn { background: none; border: none; cursor: pointer; font-size: 1rem; line-height: 1; padding: 0 2px; transition: color .15s; border-radius: 3px; }
    .del-btn.del-dentist { color: #90c4e0; } .del-btn.del-dentist:hover { color: var(--red); }
    .del-btn.del-asst    { color: var(--asst-bd); } .del-btn.del-asst:hover { color: var(--red); }
    .add-btn { background: none; border: 1.5px dashed; border-radius: 7px; font-size: .7rem; font-family: inherit; padding: 3px 8px; cursor: pointer; text-align: left; transition: all .15s; margin-top: 2px; font-weight: 600; }
    .add-btn.add-dentist { border-color: #c5dcee; color: var(--brand); } .add-btn.add-dentist:hover { background: var(--brand-pale); border-color: var(--brand); }
    .add-btn.add-asst    { border-color: var(--asst-bd); color: var(--asst); } .add-btn.add-asst:hover { background: var(--asst-pale); border-color: var(--asst); }
    .add-btn.hidden { display: none; }
    .inline-input { display: flex; gap: 4px; margin-top: 2px; }
    .inline-input input { flex: 1; border: 1.5px solid; border-radius: 7px; padding: 4px 8px; font-size: .78rem; font-family: inherit; outline: none; min-width: 0; }
    .inline-input.inp-dentist input { border-color: var(--brand); background: var(--brand-pale); color: var(--text-hd); }
    .inline-input.inp-asst    input { border-color: var(--asst);  background: var(--asst-pale);  color: var(--text-hd); }
    .inline-input button { color: white; border: none; border-radius: 7px; padding: 4px 9px; cursor: pointer; font-size: .8rem; font-weight: 700; font-family: inherit; transition: background .15s; }
    .inline-input.inp-dentist button.ok { background: var(--brand); } .inline-input.inp-dentist button.ok:hover { background: var(--brand-dk); }
    .inline-input.inp-asst    button.ok { background: var(--asst);  } .inline-input.inp-asst    button.ok:hover { background: var(--asst-dk); }
    .inline-input button.cancel { background: #e8edf2; color: var(--text-bd); } .inline-input button.cancel:hover { background: #d5dde6; }
    .inline-input.hidden { display: none; }
    @keyframes tagIn { from { opacity: 0; transform: translateY(-5px) scale(.97); } to { opacity: 1; transform: none; } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 60%{transform:translateX(4px)} }
    .shake { animation: shake .3s ease; }

    /* ── TOAST ── */
    #toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast { padding: 10px 18px; border-radius: 10px; font-size: .82rem; font-weight: 600; color: white; box-shadow: var(--sh-md); animation: toastIn .25s ease; max-width: 280px; }
    .toast.success { background: linear-gradient(135deg, var(--green), #15803d); }
    .toast.error   { background: linear-gradient(135deg, var(--red), #b91c1c); }
    .toast.info    { background: linear-gradient(135deg, var(--brand), var(--brand-dk)); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    /* ── FOOTER ── */
    footer { text-align: center; font-size: .71rem; color: var(--text-mu); padding: 0 36px 28px; }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,37,64,.5); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 18px; padding: 32px; width: 92%; max-width: 460px; box-shadow: var(--sh-lg); animation: mIn .22s cubic-bezier(.34,1.3,.64,1); position: relative; }
    @keyframes mIn { from { transform: translateY(20px) scale(.97); opacity: 0; } to { transform: none; opacity: 1; } }
    .modal-hdr { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .modal-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
    .modal-icon svg { width: 20px; height: 20px; fill: white; }
    .modal-icon.ic-dentist { background: linear-gradient(135deg, var(--brand), var(--brand-dk)); }
    .modal-icon.ic-asst    { background: linear-gradient(135deg, var(--asst), var(--asst-dk)); }
    .modal h2 { font-size: 1.05rem; font-weight: 700; color: var(--text-hd); }
    .modal label { font-size: .76rem; font-weight: 600; color: var(--text-mu); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 5px; }
    .modal input, .modal select { width: 100%; border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 13px; font-size: .88rem; font-family: inherit; outline: none; margin-bottom: 16px; color: var(--text-hd); background: var(--bg); transition: border-color .15s, box-shadow .15s; }
    .modal input:focus, .modal select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(0,120,190,.12); background: white; }
    .modal-type-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
    .type-tab { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg); cursor: pointer; font-family: inherit; font-size: .82rem; font-weight: 600; color: var(--text-mu); transition: all .15s; text-align: center; }
    .type-tab.active-dentist { border-color: var(--brand); background: var(--brand-pale); color: var(--brand-dk); }
    .type-tab.active-asst    { border-color: var(--asst);  background: var(--asst-pale);  color: var(--asst-dk); }
    .modal-actions { display: flex; gap: 9px; justify-content: flex-end; margin-top: 4px; }
    .modal-x { position: absolute; top: 16px; right: 18px; background: none; border: none; cursor: pointer; color: var(--text-mu); font-size: 1.4rem; line-height: 1; transition: color .15s; }
    .modal-x:hover { color: var(--text-hd); }

    /* ── PRINT ── */
    @media print {
      .toolbar, .dashboard, .accent-bar, footer, .add-btn, .del-btn,
      .inline-input, .modal-overlay, #toast-wrap { display: none !important; }
      header { box-shadow: none; border-bottom: 2px solid var(--brand); }
      .grid-wrap { padding: 12px 0; overflow: visible; }
      table { box-shadow: none; border: 1px solid var(--border); }
      .name-tag { animation: none; }
      body { background: white; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      header, .toolbar, .grid-wrap, footer, .dashboard { padding-left: 16px; padding-right: 16px; }
      .hdr-stats, .tright { display: none; }
    }
  </style>
</head>
<body>

<script>
/* ─────────────────────────────────────────────────────
   CONSTANTS
───────────────────────────────────────────────────── */
const DAYS   = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag'];
const DAYS_S = ['Man','Tir','Ons','Tor','Fre'];
const ROOMS = 12;
const MAX_D = 3;   // max dentists per cell
const MAX_A = 2;   // max assistants per cell
const KEY   = 'colosseum_v5';

/* ─────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────── */
let weekOff    = 0;
let data       = loadData();
let modalType  = 'dentist';

/* ─────────────────────────────────────────────────────
   DATA PERSISTENCE
───────────────────────────────────────────────────── */
function loadData() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return JSON.parse(raw);

    // Migrate from earlier versions (v2–v4)
    const legacy = localStorage.getItem('colosseum_v4')
                || localStorage.getItem('colosseum_v3')
                || localStorage.getItem('colosseum_v2');
    if (legacy) {
      const old = JSON.parse(legacy);
      const migrated = {};
      for (let r = 1; r <= ROOMS; r++) {
        migrated[r] = {};
        for (let di = 0; di < 5; di++) {
          const prev = old[r] && old[r][di];
          const names = Array.isArray(prev) ? prev
                      : (prev && prev.dentists ? prev.dentists : []);
          const assts = prev && prev.assistants ? prev.assistants : [];
          migrated[r][di] = { dentists: names, assistants: assts };
        }
      }
      return migrated;
    }
  } catch (e) { /* corrupt storage — start fresh */ }

  return emptyDataStore();
}

function emptyDataStore() {
  const d = {};
  for (let r = 1; r <= ROOMS; r++) {
    d[r] = {};
    for (let di = 0; di < 5; di++) d[r][di] = { dentists: [], assistants: [] };
  }
  return d;
}

function saveData() {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch (e) {}
}

/**
 * Read-only safe accessor — never mutates data.
 * Returns a real cell reference if it exists, otherwise a dummy.
 */
function getCell(r, d) {
  return (data[r] && data[r][d] && data[r][d].dentists)
    ? data[r][d]
    : { dentists: [], assistants: [] };
}

/**
 * Write accessor — ensures the cell exists before returning it.
 * Only call this when you intend to mutate.
 */
function ensureCell(r, d) {
  if (!data[r])         data[r]    = {};
  if (!data[r][d] || !data[r][d].dentists) data[r][d] = { dentists: [], assistants: [] };
  return data[r][d];
}

/* ─────────────────────────────────────────────────────
   DATE UTILITIES
───────────────────────────────────────────────────── */
function getMondayOfWeek(offset) {
  const now  = new Date();
  const diff = now.getDay() === 0 ? -6 : 1 - now.getDay();
  const mon  = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0, 0, 0, 0);
  return mon;
}

function getWeekDates(offset) {
  const mon = getMondayOfWeek(offset);
  return [0,1,2,3,4].map(i => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function fmtShort(d)   { return d.toLocaleDateString('nb-NO', { day: 'numeric', month: 'short' }); }
function fmtFull(d)    { return d.toLocaleDateString('nb-NO', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
function fmtMonthYear(d) { return d.toLocaleDateString('nb-NO', { month: 'long', year: 'numeric' }); }

function isToday(d) {
  const n = new Date();
  return d.getDate() === n.getDate() && d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
}

function getWeekNumber(d) {
  const u = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  u.setUTCDate(u.getUTCDate() + 4 - (u.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(u.getUTCFullYear(), 0, 1));
  return Math.ceil((((u - yearStart) / 86400000) + 1) / 7);
}

function getWorkdaysInMonth(year, month) {
  const days = [];
  const d    = new Date(year, month, 1);
  while (d.getMonth() === month) {
    const wd = d.getDay();
    if (wd >= 1 && wd <= 5) days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

/* ─────────────────────────────────────────────────────
   STATS — use read-only getCell, never mutate
───────────────────────────────────────────────────── */
function safePct(n, cap) { return cap > 0 ? Math.round(n / cap * 100) : 0; }

function getDayStats(dayIdx) {
  let dentists = 0, assistants = 0;
  for (let r = 1; r <= ROOMS; r++) {
    const c = getCell(r, dayIdx);
    dentists   += c.dentists.length;
    assistants += c.assistants.length;
  }
  return { dentists, assistants, cap: ROOMS * MAX_D };
}

function getWeekStats() {
  let dentists = 0, assistants = 0;
  for (let r = 1; r <= ROOMS; r++) {
    for (let di = 0; di < 5; di++) {
      const c = getCell(r, di);
      dentists   += c.dentists.length;
      assistants += c.assistants.length;
    }
  }
  const cap = ROOMS * 5 * MAX_D;
  return { dentists, assistants, cap, pct: safePct(dentists, cap) };
}

/**
 * Monthly stats — note: data is stored per-weekday (not per calendar date),
 * so we multiply each weekday's pattern by how many times it occurs this month.
 */
function getMonthStats(year, month) {
  const workdays = getWorkdaysInMonth(year, month);
  // Count occurrences of each weekday index (0=Mon … 4=Fri) in this month
  const occurrences = [0, 0, 0, 0, 0];
  workdays.forEach(d => occurrences[d.getDay() - 1]++);

  let dentists = 0, assistants = 0;
  for (let di = 0; di < 5; di++) {
    for (let r = 1; r <= ROOMS; r++) {
      const c = getCell(r, di);
      dentists   += c.dentists.length   * occurrences[di];
      assistants += c.assistants.length * occurrences[di];
    }
  }
  const cap = workdays.length * ROOMS * MAX_D;
  return { dentists, assistants, cap, pct: safePct(dentists, cap) };
}

/* ─────────────────────────────────────────────────────
   DASHBOARD — extracted card builder for readability
───────────────────────────────────────────────────── */
function makeDashCard({ cssClass, dotColor, title, stats, pills, note }) {
  const pct = safePct(stats.dentists, stats.cap);
  const pillsHtml = pills ? `<div class="dash-days">${pills}</div>` : '';
  const noteHtml  = note  ? `<div class="dash-note">${note}</div>`  : '';
  return `
    <div class="dash-card ${cssClass}">
      <div class="dash-title">
        <span class="dot" style="background:${dotColor}"></span>${title}
      </div>
      <div class="dash-metrics">
        <div class="dash-metric m-dentist">
          <div class="val">${stats.dentists}</div>
          <div class="lbl">Tannleger</div>
        </div>
        <div class="dash-div"></div>
        <div class="dash-metric m-asst">
          <div class="val">${stats.assistants}</div>
          <div class="lbl">Assistenter</div>
        </div>
        <div class="dash-div"></div>
        <div class="dash-metric m-pct">
          <div class="val">${pct}%</div>
          <div class="lbl">Utnyttelse</div>
        </div>
      </div>
      <div class="dash-bar-wrap"><div class="dash-bar" style="width:${pct}%"></div></div>
      ${pillsHtml}
      ${noteHtml}
    </div>`;
}

function renderDashboard() {
  const dates = getWeekDates(weekOff);
  const now   = new Date();
  const todayDi = dates.findIndex(d => isToday(d));

  const wk = getWeekStats();
  const mo = getMonthStats(now.getFullYear(), now.getMonth());

  // Per-day pills for the week card
  const pills = dates.map((d, i) => {
    const st  = getDayStats(i);
    const pct = safePct(st.dentists, st.cap);
    const cls = isToday(d) ? 'today' : st.dentists > 0 ? '' : 'empty';
    return `<span class="day-pill ${cls}" title="${DAYS[i]}: ${st.dentists} tannleger, ${st.assistants} assistenter">${DAYS_S[i]} ${pct}%</span>`;
  }).join('');

  let todayHtml;
  if (todayDi >= 0) {
    todayHtml = makeDashCard({
      cssClass:  'day-card',
      dotColor:  'var(--brand)',
      title:     'I dag',
      stats:     getDayStats(todayDi),
    });
  } else {
    todayHtml = `<div class="dash-card day-card">
      <div class="dash-title"><span class="dot" style="background:var(--brand)"></span>I dag</div>
      <div style="font-size:.8rem;color:var(--text-mu);margin-top:4px">Ikke en arbeidsdag</div>
    </div>`;
  }

  const weekHtml = makeDashCard({
    cssClass:  'week-card',
    dotColor:  'var(--accent)',
    title:     `Denne uken (Uke ${getWeekNumber(dates[0])})`,
    stats:     wk,
    pills,
  });

  const monthHtml = makeDashCard({
    cssClass:  'month-card',
    dotColor:  'var(--gold)',
    title:     fmtMonthYear(now),
    stats:     mo,
    note:      'Basert på ukentlig mønster × antall av hver ukedag i måneden',
  });

  document.getElementById('dashboard').innerHTML = todayHtml + weekHtml + monthHtml;
}

/* ─────────────────────────────────────────────────────
   TOAST NOTIFICATIONS
───────────────────────────────────────────────────── */
function showToast(msg, type = 'success', duration = 2000) {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(() => el.remove(), 350);
  }, duration);
}

/* ─────────────────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────────────────── */
function shiftWeek(delta) { weekOff += delta; render(); }
function goToday()        { weekOff = 0;       render(); }

/* ─────────────────────────────────────────────────────
   RENDER TABLE
───────────────────────────────────────────────────── */
function render() {
  const dates = getWeekDates(weekOff);
  const wkNum = getWeekNumber(dates[0]);
  document.getElementById('week-label').textContent =
    `Uke ${wkNum} \u00B7 ${fmtShort(dates[0])} \u2013 ${fmtShort(dates[4])} ${dates[4].getFullYear()}`;

  // Rebuild header columns
  const hrow = document.getElementById('hrow');
  while (hrow.children.length > 1) hrow.removeChild(hrow.lastChild);
  dates.forEach((d, i) => {
    const th = document.createElement('th');
    th.scope = 'col';
    if (isToday(d)) th.classList.add('today-col');
    th.innerHTML = `<span class="day-name">${DAYS[i]}</span><span class="date-sub">${fmtShort(d)}</span>`;
    hrow.appendChild(th);
  });

  // Rebuild body rows
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  for (let r = 1; r <= ROOMS; r++) {
    const tr  = document.createElement('tr');
    const td0 = document.createElement('td');
    td0.innerHTML = `
      <div class="room-badge">
        <div class="room-num" aria-hidden="true">${r}</div>
        <div>
          <div class="room-lbl">Rom ${r}</div>
          <div class="room-sub">Behandling #${r}</div>
        </div>
      </div>`;
    tr.appendChild(td0);

    for (let di = 0; di < 5; di++) {
      const td = document.createElement('td');
      if (isToday(dates[di])) td.classList.add('today-col');
      td.dataset.room = r;
      td.dataset.day  = di;
      td.appendChild(buildCell(r, di));
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

  renderDashboard();
}

/* ─────────────────────────────────────────────────────
   CELL BUILDING
───────────────────────────────────────────────────── */
function buildCell(r, d) {
  const wrap = document.createElement('div');
  wrap.className = 'cell';
  wrap.id = `cell-${r}-${d}`;

  const c = getCell(r, d);  // read-only

  // Dentist section
  const dsec = buildSection('dentist', r, d, c.dentists, MAX_D);
  wrap.appendChild(dsec);

  // Assistant section
  const asec = buildSection('asst', r, d, c.assistants, MAX_A);
  wrap.appendChild(asec);

  return wrap;
}

function buildSection(type, r, d, names, max) {
  const isDentist = (type === 'dentist');
  const sec = document.createElement('div');
  sec.className = 'cell-section';

  // Section label
  const label = document.createElement('div');
  label.className = `section-label lbl-${type}`;
  const colour = isDentist ? '#0078be' : '#7c3aed';
  label.innerHTML = `<svg viewBox="0 0 10 10" fill="none" aria-hidden="true"><circle cx="5" cy="5" r="4" fill="${colour}"/></svg> ${isDentist ? 'Tannlege / Spesialist' : 'Assistent'}`;
  sec.appendChild(label);

  // Name tags
  names.forEach((name, idx) => sec.appendChild(makeNameTag(name, type, r, d, idx)));

  // Add button
  const addBtn = document.createElement('button');
  addBtn.className = `add-btn add-${type}${names.length >= max ? ' hidden' : ''}`;
  addBtn.textContent = isDentist ? '+ Legg til tannlege' : '+ Legg til assistent';
  addBtn.onclick = () => showInlineInput(r, d, type);
  sec.appendChild(addBtn);

  // Inline input (hidden by default)
  sec.appendChild(makeInlineInput(r, d, type));

  return sec;
}

function makeNameTag(name, type, r, d, idx) {
  const tag    = document.createElement('div');
  tag.className = `name-tag tag-${type}`;

  const initials = name.trim().split(/\s+/).map(w => w[0] || '').join('').slice(0, 2).toUpperCase();
  const avatar   = document.createElement('div');
  avatar.className = `avatar av-${type}`;
  avatar.textContent = initials;
  avatar.setAttribute('aria-hidden', 'true');

  const nameSpan = document.createElement('span');
  nameSpan.className = 'tag-name';
  nameSpan.title     = name;
  nameSpan.textContent = name;

  const delBtn = document.createElement('button');
  delBtn.className = `del-btn del-${type}`;
  delBtn.innerHTML = '&times;';
  delBtn.title     = `Fjern ${name}`;
  delBtn.setAttribute('aria-label', `Fjern ${name}`);
  delBtn.onclick = () => deleteName(r, d, type, idx);

  tag.appendChild(avatar);
  tag.appendChild(nameSpan);
  tag.appendChild(delBtn);
  return tag;
}

function makeInlineInput(r, d, type) {
  const wrap = document.createElement('div');
  wrap.className = `inline-input inp-${type} hidden`;
  wrap.id = `input-${r}-${d}-${type}`;

  const input = document.createElement('input');
  input.type        = 'text';
  input.placeholder = type === 'dentist' ? 'Navn på tannlege...' : 'Navn på assistent...';
  input.maxLength   = 40;
  input.autocomplete = 'off';
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  confirmInlineAdd(r, d, type);
    if (e.key === 'Escape') cancelInlineInput(r, d, type);
  });

  const okBtn = document.createElement('button');
  okBtn.className   = 'ok';
  okBtn.innerHTML   = '&#10003;';
  okBtn.setAttribute('aria-label', 'Bekreft');
  okBtn.onclick = () => confirmInlineAdd(r, d, type);

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cancel';
  cancelBtn.innerHTML = '&#10005;';
  cancelBtn.setAttribute('aria-label', 'Avbryt');
  cancelBtn.onclick = () => cancelInlineInput(r, d, type);

  wrap.appendChild(input);
  wrap.appendChild(okBtn);
  wrap.appendChild(cancelBtn);
  return wrap;
}

/* ─────────────────────────────────────────────────────
   INLINE INPUT CONTROL
───────────────────────────────────────────────────── */
function showInlineInput(r, d, type) {
  const cellEl = document.getElementById(`cell-${r}-${d}`);
  const addBtn = cellEl && cellEl.querySelector(`.add-btn.add-${type}`);
  if (addBtn) addBtn.classList.add('hidden');

  const inputWrap = document.getElementById(`input-${r}-${d}-${type}`);
  if (inputWrap) {
    inputWrap.classList.remove('hidden');
    inputWrap.querySelector('input').focus();
  }
}

function cancelInlineInput(r, d, type) {
  const inputWrap = document.getElementById(`input-${r}-${d}-${type}`);
  if (inputWrap) {
    inputWrap.classList.add('hidden');
    inputWrap.querySelector('input').value = '';
  }

  const c   = getCell(r, d);
  const max = type === 'dentist' ? MAX_D : MAX_A;
  const arr = type === 'dentist' ? c.dentists : c.assistants;
  if (arr.length < max) {
    const cellEl = document.getElementById(`cell-${r}-${d}`);
    const addBtn = cellEl && cellEl.querySelector(`.add-btn.add-${type}`);
    if (addBtn) addBtn.classList.remove('hidden');
  }
}

function confirmInlineAdd(r, d, type) {
  const inputWrap = document.getElementById(`input-${r}-${d}-${type}`);
  if (!inputWrap) return;
  const val = inputWrap.querySelector('input').value.trim();
  if (!val) {
    inputWrap.querySelector('input').focus();
    return;
  }
  addName(r, d, type, val);
}

/* ─────────────────────────────────────────────────────
   DATA MUTATIONS
───────────────────────────────────────────────────── */
function addName(r, d, type, name) {
  const c   = ensureCell(r, d);  // only mutates when writing
  const arr = type === 'dentist' ? c.dentists : c.assistants;
  const max = type === 'dentist' ? MAX_D : MAX_A;

  if (arr.length >= max) {
    showToast(`Maks ${max} ${type === 'dentist' ? 'tannleger' : 'assistenter'} per rom`, 'error');
    return;
  }

  // Duplicate guard — case-insensitive check
  const nameLower = name.toLowerCase();
  if (arr.some(n => n.toLowerCase() === nameLower)) {
    showToast(`"${name}" er allerede lagt til`, 'error');
    // Shake the existing tag to draw attention
    const cellEl = document.getElementById(`cell-${r}-${d}`);
    if (cellEl) {
      const tags = cellEl.querySelectorAll(`.name-tag.tag-${type}`);
      tags.forEach(t => {
        if (t.querySelector('.tag-name').textContent.toLowerCase() === nameLower) {
          t.classList.remove('shake');
          void t.offsetWidth; // force reflow to restart animation
          t.classList.add('shake');
        }
      });
    }
    return;
  }

  arr.push(name);
  saveData();
  refreshCell(r, d);
  renderDashboard();
  showToast(`${name} lagt til i Rom ${r}`, 'success');
}

function deleteName(r, d, type, idx) {
  const c   = ensureCell(r, d);
  const arr = type === 'dentist' ? c.dentists : c.assistants;
  if (idx < 0 || idx >= arr.length) return;
  const removed = arr.splice(idx, 1)[0];
  saveData();
  refreshCell(r, d);
  renderDashboard();
  showToast(`${removed} fjernet fra Rom ${r}`, 'info');
}

function refreshCell(r, d) {
  const td = document.querySelector(`td[data-room="${r}"][data-day="${d}"]`);
  if (!td) return;
  td.innerHTML = '';
  td.appendChild(buildCell(r, d));
}

/* ─────────────────────────────────────────────────────
   MODAL
───────────────────────────────────────────────────── */
function setModalType(type) {
  modalType = type;
  const isDentist = (type === 'dentist');

  document.getElementById('tab-dentist').className = 'type-tab' + (isDentist ? ' active-dentist' : '');
  document.getElementById('tab-asst').className    = 'type-tab' + (!isDentist ? ' active-asst' : '');
  document.getElementById('modal-icon').className  = `modal-icon ic-${type}`;
  document.getElementById('modal-title').textContent = isDentist ? 'Legg til tannlege i rom' : 'Legg til assistent i rom';
  document.getElementById('m-name').placeholder = isDentist ? 'f.eks. Dr. Hansen' : 'f.eks. Assistent Olsen';

  const addBtn = document.getElementById('modal-add-btn');
  addBtn.style.background = isDentist
    ? 'linear-gradient(135deg,#0078be,#005f98)'
    : 'linear-gradient(135deg,#7c3aed,#5b21b6)';
}

function openModal(type) {
  setModalType(type || 'dentist');

  const sel = document.getElementById('m-room');
  sel.innerHTML = '';
  for (let r = 1; r <= ROOMS; r++) {
    const opt = document.createElement('option');
    opt.value = r;
    opt.textContent = `Rom ${r}`;
    sel.appendChild(opt);
  }

  document.getElementById('m-name').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-name').focus(), 80);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function closeOverlay(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function addFromModal() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }
  const r  = parseInt(document.getElementById('m-room').value, 10);
  const di = parseInt(document.getElementById('m-day').value,  10);
  addName(r, di, modalType, name);
  closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('m-name').addEventListener('keydown', e => { if (e.key === 'Enter') addFromModal(); });

/* ─────────────────────────────────────────────────────
   EXCEL EXPORT
───────────────────────────────────────────────────── */
function exportToExcel() {
  const XS = window.XLSXStyle;
  if (!XS) {
    showToast('Excel-biblioteket er ikke lastet. Prøv igjen.', 'error');
    return;
  }

  const btn = document.getElementById('btn-excel');
  btn.disabled = true;
  btn.textContent = 'Eksporterer…';

  // Yield to let the UI update before synchronous work
  setTimeout(() => {
    try {
      _doExport(XS);
      showToast('Excel-fil lastet ned!', 'success');
    } catch (err) {
      showToast('Export feilet: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="white" stroke-width="2" stroke-linejoin="round"/><path d="M14 2v6h6M8 13l2 4 2-4M8 17h4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Last ned Excel`;
    }
  }, 50);
}

function _doExport(XS) {
  const dates    = getWeekDates(weekOff);
  const wkNum    = getWeekNumber(dates[0]);
  const wkLabel  = `Uke ${wkNum} \u00B7 ${fmtShort(dates[0])} \u2013 ${fmtShort(dates[4])} ${dates[4].getFullYear()}`;
  const filename = `Colosseum_Tannlege_Uke${wkNum}_${dates[0].getFullYear()}.xlsx`;
  const COLS     = 6;  // ROM + 5 days

  /* Colour constants (ARGB format for xlsx-js-style) */
  const C = {
    brandBg:    'FF004A78',
    brandHdr:   'FF0078BE',
    brandLt:    'FFD5ECF9',
    asstLt:     'FFDDD6FE',
    white:      'FFFFFFFF',
    muted:      'FF7A8FA8',
    bodyText:   'FF334155',
    dentistTxt: 'FF005F98',
    asstTxt:    'FF5B21B6',
    border:     'FFDDE6EF',
  };

  const thin = (rgb = C.border) => ({ style: 'thin', color: { rgb } });

  function cellBorder() {
    return { top: thin(), bottom: thin(), left: thin(), right: thin() };
  }

  function sty({ fontOpts = {}, fill, alignOpts = {}, noBorder = false } = {}) {
    return {
      font: { name: 'Arial', sz: 10, color: { rgb: C.bodyText }, ...fontOpts },
      fill: fill ? { patternType: 'solid', fgColor: { rgb: fill } } : { patternType: 'none' },
      alignment: { vertical: 'center', wrapText: true, ...alignOpts },
      border: noBorder ? {} : cellBorder(),
    };
  }

  /* Build sheet data */
  const aoa = [];
  aoa.push(['COLOSSEUM TANNLEGE \u2013 ROMPLANSYSTEM', '', '', '', '', '']);
  aoa.push([wkLabel, '', '', '', '', '']);
  aoa.push(['', '', '', '', '', '']);
  aoa.push(['ROM', ...dates.map((d, i) => `${DAYS[i]}\n${fmtFull(d)}`)]);

  for (let r = 1; r <= ROOMS; r++) {
    const dRow = [`Rom ${r} \u2013 Tannleger / Spesialist`];
    const aRow = ['   Assistenter'];
    for (let di = 0; di < 5; di++) {
      const c = getCell(r, di);
      dRow.push(c.dentists.length   ? c.dentists.join('\n')   : '');
      aRow.push(c.assistants.length ? c.assistants.join('\n') : '');
    }
    aoa.push(dRow);
    aoa.push(aRow);
  }

  const now = new Date();
  aoa.push([`Eksportert: ${now.toLocaleDateString('nb-NO', { day:'2-digit', month:'long', year:'numeric' })} kl. ${now.toLocaleTimeString('nb-NO', { hour:'2-digit', minute:'2-digit' })}`, '', '', '', '', '']);

  const ws = XS.utils.aoa_to_sheet(aoa);
  const enc = XS.utils.encode_cell;
  const footerRow = 4 + ROOMS * 2;

  /* Apply styles row by row */
  // Row 0: Title
  for (let c = 0; c < COLS; c++) {
    const ref = enc({ r: 0, c });
    if (!ws[ref]) ws[ref] = { t: 's', v: '' };
    ws[ref].s = sty({ fontOpts: { bold: true, sz: 15, color: { rgb: C.white } }, fill: C.brandBg, alignOpts: { horizontal: 'center' }, noBorder: true });
  }
  // Row 1: Week label
  for (let c = 0; c < COLS; c++) {
    const ref = enc({ r: 1, c });
    if (!ws[ref]) ws[ref] = { t: 's', v: '' };
    ws[ref].s = sty({ fontOpts: { sz: 11, italic: true, color: { rgb: C.white } }, fill: C.brandHdr, alignOpts: { horizontal: 'center' }, noBorder: true });
  }
  // Row 2: spacer
  for (let c = 0; c < COLS; c++) {
    const ref = enc({ r: 2, c });
    if (!ws[ref]) ws[ref] = { t: 's', v: '' };
    ws[ref].s = sty({ fill: C.white, noBorder: true });
  }
  // Row 3: Column headers
  for (let c = 0; c < COLS; c++) {
    const ref = enc({ r: 3, c });
    if (!ws[ref]) ws[ref] = { t: 's', v: '' };
    ws[ref].s = sty({ fontOpts: { bold: true, sz: 10, color: { rgb: C.white } }, fill: c === 0 ? C.brandBg : C.brandHdr, alignOpts: { horizontal: 'center' } });
  }
  // Room rows (2 per room)
  for (let r = 0; r < ROOMS; r++) {
    const dRow = 4 + r * 2;
    const aRow = 4 + r * 2 + 1;
    for (let c = 0; c < COLS; c++) {
      const dRef = enc({ r: dRow, c });
      const aRef = enc({ r: aRow, c });
      if (!ws[dRef]) ws[dRef] = { t: 's', v: '' };
      if (!ws[aRef]) ws[aRef] = { t: 's', v: '' };
      ws[dRef].s = sty({ fontOpts: { sz: c === 0 ? 9.5 : 9.5, bold: c === 0, color: { rgb: C.dentistTxt } }, fill: C.brandLt });
      ws[aRef].s = sty({ fontOpts: { sz: 9.5, italic: c === 0, color: { rgb: C.asstTxt } }, fill: C.asstLt });
    }
  }
  // Footer
  for (let c = 0; c < COLS; c++) {
    const ref = enc({ r: footerRow, c });
    if (!ws[ref]) ws[ref] = { t: 's', v: '' };
    ws[ref].s = sty({ fontOpts: { sz: 8.5, italic: true, color: { rgb: C.muted } }, fill: C.white, noBorder: true });
  }

  /* Merges */
  ws['!merges'] = [
    { s: { r: 0, c: 0 }, e: { r: 0, c: 5 } },
    { s: { r: 1, c: 0 }, e: { r: 1, c: 5 } },
    { s: { r: 2, c: 0 }, e: { r: 2, c: 5 } },
    { s: { r: footerRow, c: 0 }, e: { r: footerRow, c: 5 } },
  ];

  /* Column widths & row heights */
  ws['!cols'] = [{ wch: 26 }, { wch: 24 }, { wch: 24 }, { wch: 24 }, { wch: 24 }, { wch: 24 }];
  const rowH = [];
  rowH[0] = { hpt: 28 };
  rowH[1] = { hpt: 20 };
  rowH[2] = { hpt: 8  };
  rowH[3] = { hpt: 36 };
  for (let r = 0; r < ROOMS; r++) {
    rowH[4 + r * 2]     = { hpt: 44 };
    rowH[4 + r * 2 + 1] = { hpt: 36 };
  }
  rowH[footerRow] = { hpt: 18 };
  ws['!rows'] = rowH;

  const wb = XS.utils.book_new();
  XS.utils.book_append_sheet(wb, ws, `Uke ${wkNum}`);
  XS.writeFile(wb, filename);
}

/* ─────────────────────────────────────────────────────
   BOOT
───────────────────────────────────────────────────── */
render();
</script>
